workflows:
  ios-workflow:
    name: Build BlazonCalc
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.blazonshots.calculator
    scripts:
      - name: Force modern Xcode build settings
        script: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('BlazonCalc.xcodeproj/project.pbxproj')
          s = p.read_text()
          def repl(m):
              body = m.group(1)
              if 'ALWAYS_SEARCH_USER_PATHS' not in body:
                  body = 'ALWAYS_SEARCH_USER_PATHS = NO; ' + body
              else:
                  body = re.sub(r'ALWAYS_SEARCH_USER_PATHS\\s*=\\s*[^;]+;', 'ALWAYS_SEARCH_USER_PATHS = NO;', body)
              return 'buildSettings = {' + body + '};'
          s = re.sub(r'buildSettings = \\{(.*?)\\};', repl, s, flags=re.S)
          p.write_text(s)
          PY
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: xcode-project build-ipa --project "BlazonCalc.xcodeproj" --scheme "BlazonCalc"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
