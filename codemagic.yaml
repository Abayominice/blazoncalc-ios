workflows:
  ios-workflow:
    name: Build BlazonCalc
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.blazonshots.calculator

    scripts:
      - name: Install XcodeGen if needed
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate clean Xcode project
        script: |
          rm -rf BlazonCalc.xcodeproj
          xcodegen generate

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "BlazonCalc.xcodeproj"

      - name: Build IPA
        script: |
          set -o pipefail
          xcode-project build-ipa --project "BlazonCalc.xcodeproj" --scheme "BlazonCalc"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
