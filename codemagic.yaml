workflows:
  ios-workflow:
    name: Build BlazonCalc
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.blazonshots.calculator
    scripts:
      - name: Install XcodeGen if needed
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Generate clean Xcode project
        script: |
          rm -rf BlazonCalc.xcodeproj
          xcodegen generate
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "BlazonCalc.xcodeproj"
      - name: Verify project settings
        script: |
          xcodebuild -project "BlazonCalc.xcodeproj" -scheme "BlazonCalc" -showBuildSettings | grep -E "ALWAYS_SEARCH_USER_PATHS|PRODUCT_BUNDLE_IDENTIFIER|DEVELOPMENT_TEAM|CODE_SIGN_STYLE|PROVISIONING_PROFILE_SPECIFIER" || true
      - name: Build IPA
        script: |
          set -o pipefail
          xcode-project build-ipa --project "BlazonCalc.xcodeproj" --scheme "BlazonCalc"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        submit_to_testflight: true
